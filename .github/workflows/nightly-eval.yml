# .github/workflows/nightly-eval.yml
# 医疗 Agentic RAG —— 夜间全量评测 + 基线刷新
#
# 每日 UTC 2:00（北京时间 10:00）运行端到端质量评测，
# 更新基线 JSON。若质量退步则自动发 Issue 报警。
#
# 依赖：SENSENOVA_API_KEY GitHub Secret（免费额度，20 并发）
#       better-sqlite3 原生模块（需 apt 安装编译链）

name: Nightly Eval

on:
  schedule:
    - cron: "0 2 * * *"   # 每日 UTC 2:00 = 北京时间 10:00
  workflow_dispatch:       # 支持手动触发

jobs:
  evaluate:
    name: 端到端质量评测 & 基线刷新
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: 安装构建依赖（better-sqlite3 原生模块）
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends python3 make g++
          npm ci

      - name: 真实链路冒烟（需真库；无库 runner 优雅跳过，P2-④）
        continue-on-error: true
        env:
          CI: "true"
        run: |
          node scripts/ops/smoke-real-link.mjs --json || {
            code=$?
            if [ "$code" -eq 2 ]; then
              echo "::notice::真实链路冒烟跳过（本 runner 无真库，属预期）"
            else
              echo "::error::真实链路冒烟失败（exit $code）"
              exit 1
            fi
          }

      - name: 运行全量评测
        env:
          SENSENOVA_API_KEY: ${{ secrets.SENSENOVA_API_KEY }}
          CI: "true"
        run: node tests/unit/answer-quality-judge.mjs

      - name: 运行质量门禁（阈值 + 新报告 vs 基线回归对比）
        id: gate
        continue-on-error: true
        run: |
          node tests/eval-ci-gate.mjs --report=tests/reports/answer-quality-report.json --baseline=tests/reports/baseline.json --compare --strict && echo "PASS=true" >> $GITHUB_OUTPUT || echo "PASS=false" >> $GITHUB_OUTPUT

      - name: 更新基线 JSON
        if: steps.gate.outputs.PASS == 'true'
        run: |
          cp tests/reports/answer-quality-report.json tests/reports/baseline.json
          git config user.name "nightly-eval-bot"
          git config user.email "bot@medical-rag.local"
          git add tests/reports/baseline.json
          git commit -m "chore: 夜间评测基线刷新 $(date +'%Y-%m-%d')"
          git push

      - name: 质量退步 → 创建 Issue 报警
        if: steps.gate.outputs.PASS == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('tests/reports/answer-quality-report.json', 'utf-8'));
            const kpi = report.metrics?.kpi || {};
            const body = [
              '## ⚠ 端到端质量退步检测',
              '',
              '夜间评测（' + new Date().toISOString() + '）基线校验未通过。',
              '',
              '### 当前指标',
              '- 引用召回率: ' + (kpi.citationRecall ?? 'N/A') + '%（期望 ≥70%）',
              '- 忠实度: ' + (kpi.llmJudge?.faithfulness ?? 'N/A'),
              '- 安全: ' + (kpi.llmJudge?.safety ?? 'N/A'),
              '- 禁戒违例率: ' + (kpi.forbiddenViolationRate ?? 'N/A') + '%',
              '',
              '请排查最近一次 PR 合入是否导致质量退化。',
              '详情见: ' + context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId,
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '⚠ 端到端质量退步检测（' + new Date().toISOString().slice(0, 10) + '）',
              body: body,
              labels: ['quality', 'automated'],
            });
