# ============================================================
# 医疗 Agentic RAG — 单容器编排（Web 界面 + HTTP API 两服务）
# 用法：
#   docker compose up --build      # 首次构建
#   docker compose up -d           # 后台运行
#   docker compose down            # 停止
# 访问：
#   Web 界面：http://localhost:31415/
#   HTTP API ：http://localhost:8080/   （POST /api/v1/ask 等，见 deploy/README.md）
# ============================================================
services:
  medical-rag:
    build: .
    image: medical-agentic-rag:latest
    container_name: medical-rag
    env_file: .env
    environment:
      - WEBUI_HOST=0.0.0.0
      - WEBUI_PORT=31415
      # 禁用启动期版本探测（离线/容器内避免阻塞）
      - PI_WEBUI_PI_LATEST_VERSION_URL=http://127.0.0.1:9/nope
    ports:
      - "31415:31415"
      - "19100:19100"   # Prometheus 指标（Web 服务的 metrics-exporter 同端口）
    volumes:
      # KB 隔离（P1 修复）：每个 Pi 实例持独立 KB 副本（kb_rag 卷），
      # 经 provision-kb 从宿主机只读源灌入，杜绝两容器共享 WAL 写锁争用崩溃。
      - kb_rag:/root/.pi/knowledge
      # 审计/会话日志持久化（指标导出器读取 .pi/logs/audit-*.ndjson）
      - medical-rag-logs:/app/.pi/logs
      - medical-rag-sessions:/root/.pi/sessions
    depends_on:
      provision-kb:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "/app/scripts/ops/healthcheck.mjs", "http://127.0.0.1:31415/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  medical-api:
    build: .
    image: medical-agentic-rag:latest
    container_name: medical-api
    env_file: .env
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8080
      # llm-judge 通过 provider-proxy 路由（替代直连 sensenova API，共享键池轮询+重试）
      - SENSENOVA_PROXY_URL=http://127.0.0.1:18880/v1/chat/completions
      - MEDICAL_API_RUN=1
      # API 服务自举 provider-proxy（LLM 网关）；如需鉴权，设 API_TOKEN
      # - API_TOKEN=change_me
    ports:
      - "8080:8080"
      - "19101:19100"   # API 服务自带 /metrics（避免与 Web 服务 19100 冲突）
    volumes:
      # KB 隔离（P1 修复）：独立 kb_api 卷，与 Web 服务 kb_rag 物理隔离
      - kb_api:/root/.pi/knowledge
      - medical-api-logs:/app/.pi/logs
      - medical-api-sessions:/app/.pi/sessions
    depends_on:
      provision-kb:
        condition: service_completed_successfully
    restart: unless-stopped
    entrypoint: ["/usr/local/bin/docker-entrypoint-api.sh"]
    healthcheck:
      test: ["CMD", "node", "/app/scripts/ops/healthcheck.mjs", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ============================================================
  # KB 隔离预置（P1 修复）：将宿主机只读 KB 源灌入各 Pi 实例的独立卷，
  # 使 medical-rag 与 medical-api 各持一份 KB 副本，避免共享 SQLite WAL
  # 写锁争用导致双实例崩溃（与 k8s 每 Pod 独立 emptyDir 同构）。
  # 运行一次即退出（restart: "no"），由两 Pi 服务 depends_on 等待完成。
  # KB 更新流程：在宿主机重建 ~/.pi/knowledge 后 `docker compose down && up`
  # 即重新灌入；容器内对 KB 的写入为实例本地、重启不持久（与 k8s 一致）。
  # ============================================================
  provision-kb:
    build: .
    image: medical-agentic-rag:latest
    entrypoint:
      - /bin/sh
      - -c
      - "mkdir -p /rag /api; if [ -d /src ]; then cp -a /src/. /rag/ && cp -a /src/. /api/ && echo KB_provisioned_into_per_instance_volumes; else echo WARN_host_KB_missing_instances_start_empty; fi; exit 0"
    volumes:
      - "${HOME}/.pi/knowledge:/src:ro"
      - kb_rag:/rag
      - kb_api:/api
    restart: "no"

  # ============================================================
  # 监控栈：Prometheus + Grafana（指标可视化）
  # 访问：http://localhost:9090/ (Prometheus) / http://localhost:3000/ (Grafana)
  # ============================================================
  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: medical-rag-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.console.libraries=/etc/prometheus/console_libraries
      - --web.console.templates=/etc/prometheus/consoles
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/prometheus/rules.yml:/etc/prometheus/rules.yml:ro
      - medical-rag-prometheus-data:/prometheus
    restart: unless-stopped
    depends_on:
      - medical-rag
      - medical-api

  grafana:
    image: grafana/grafana:11.2.0
    container_name: medical-rag-grafana
    ports:
      - "3000:3000"
    volumes:
      - ./deploy/grafana/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml:ro
      - ./deploy/grafana/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./deploy/grafana/medical-rag-dashboard.json:/var/lib/grafana/dashboards/medical-rag-dashboard.json:ro
      - medical-rag-grafana-data:/var/lib/grafana
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/medical-rag-dashboard.json
    restart: unless-stopped
    depends_on:
      - prometheus

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: medical-rag-alertmanager
    entrypoint: ["sh", "/etc/alertmanager/docker-entrypoint.sh"]
    ports:
      - "9093:9093"
    environment:
      - ALERT_WEBHOOK_URL=${ALERT_WEBHOOK_URL}
    volumes:
      - ./deploy/alertmanager/docker-entrypoint.sh:/etc/alertmanager/docker-entrypoint.sh:ro
      - medical-rag-alertmanager-data:/alertmanager
    restart: unless-stopped
    depends_on:
      - prometheus

  metrics-exporter:
    image: medical-agentic-rag:latest
    container_name: medical-rag-metrics-exporter
    entrypoint: ["node", "/app/scripts/ops/metrics-exporter.mjs"]
    environment:
      # 同时挂载 medical-api 与 medical-rag 两日志卷，合并审计指标
      - AUDIT_LOG_DIR=/app/.pi/logs/api:/app/.pi/logs/rag
    # 不映射宿主端口：medical-rag 已占用宿主 19100 且无进程；
    # prometheus 经 docker 网络 metrics-exporter:19100 抓取即可。
    volumes:
      - medical-api-logs:/app/.pi/logs/api
      - medical-rag-logs:/app/.pi/logs/rag
    restart: unless-stopped
    depends_on:
      - medical-api
      - medical-rag

volumes:
  kb_rag:
  kb_api:
  medical-rag-sessions:
  medical-rag-logs:
  medical-api-sessions:
  medical-api-logs:
  medical-rag-prometheus-data:
  medical-rag-grafana-data:
  medical-rag-alertmanager-data:
