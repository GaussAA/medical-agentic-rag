groups:
  - name: medical-rag-alerts
    interval: 30s
    rules:
      - alert: ProxyHighErrorRate
        expr: rate(medical_rag_proxy_errors_total[5m]) > 0.5
        for: 2m
        labels: { severity: warning }
        annotations:
          summary: "LLM proxy error rate > 0.5/s over 5m"
      - alert: ProxyUnhealthy
        expr: medical_rag_proxy_consecutive_failures > 5
        for: 1m
        labels: { severity: critical }
        annotations:
          summary: "Proxy has {{ $value }} consecutive failures"
      - alert: KbRecallDrop
        expr: medical_rag_kb_recall_rate < 0.85
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: "KB recall rate dropped to {{ $value | humanizePercentage }}"
      - alert: NoChunks
        expr: medical_rag_kb_chunks_total == 0
        for: 1m
        labels: { severity: critical }
        annotations:
          summary: "Knowledge base has zero chunks"
