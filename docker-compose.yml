# ============================================================
# 医疗 Agentic RAG — 单容器编排（Web 界面 + HTTP API 两服务）
# 用法：
#   docker compose up --build      # 首次构建
#   docker compose up -d           # 后台运行
#   docker compose down            # 停止
# 访问：
#   Web 界面：http://localhost:31415/
#   HTTP API ：http://localhost:8080/   （POST /api/v1/ask 等，见 deploy/README.md）
# ============================================================
services:
  medical-rag:
    build: .
    image: medical-agentic-rag:latest
    container_name: medical-rag
    env_file: .env
    environment:
      - WEBUI_HOST=0.0.0.0
      - WEBUI_PORT=31415
      # 禁用启动期版本探测（离线/容器内避免阻塞）
      - PI_WEBUI_PI_LATEST_VERSION_URL=http://127.0.0.1:9/nope
    ports:
      - "31415:31415"
      - "19100:19100"   # Prometheus 指标（Web 服务的 metrics-exporter 同端口）
    volumes:
      # 预构建的知识库（宿主机 ~/.pi/knowledge → 容器），避免每次重建
      - "${HOME}/.pi/knowledge:/root/.pi/knowledge"
      # 审计/会话日志持久化（指标导出器读取 .pi/logs/audit-*.ndjson）
      - medical-rag-logs:/app/.pi/logs
      - medical-rag-sessions:/root/.pi/sessions
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "/app/scripts/ops/healthcheck.mjs", "http://127.0.0.1:31415/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  medical-api:
    build: .
    image: medical-agentic-rag:latest
    container_name: medical-api
    env_file: .env
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8080
      # llm-judge 通过 provider-proxy 路由（替代直连 sensenova API，共享键池轮询+重试）
      - SENSENOVA_PROXY_URL=http://127.0.0.1:18880/v1/chat/completions
      - MEDICAL_API_RUN=1
      # API 服务自举 provider-proxy（LLM 网关）；如需鉴权，设 API_TOKEN
      # - API_TOKEN=change_me
    ports:
      - "8080:8080"
      - "19101:19100"   # API 服务自带 /metrics（避免与 Web 服务 19100 冲突）
    volumes:
      - "${HOME}/.pi/knowledge:/root/.pi/knowledge"
      - medical-api-logs:/app/.pi/logs
      - medical-api-sessions:/app/.pi/sessions
    restart: unless-stopped
    entrypoint: ["/usr/local/bin/docker-entrypoint-api.sh"]
    healthcheck:
      test: ["CMD", "node", "/app/scripts/ops/healthcheck.mjs", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ============================================================
  # 监控栈：Prometheus + Grafana（指标可视化）
  # 访问：http://localhost:9090/ (Prometheus) / http://localhost:3000/ (Grafana)
  # ============================================================
  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: medical-rag-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.console.libraries=/etc/prometheus/console_libraries
      - --web.console.templates=/etc/prometheus/consoles
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - medical-rag-prometheus-data:/prometheus
    restart: unless-stopped
    depends_on:
      - medical-rag
      - medical-api

  grafana:
    image: grafana/grafana:11.2.0
    container_name: medical-rag-grafana
    ports:
      - "3000:3000"
    volumes:
      - ./deploy/grafana/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml:ro
      - ./deploy/grafana/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./deploy/grafana/medical-rag-dashboard.json:/var/lib/grafana/dashboards/medical-rag-dashboard.json:ro
      - medical-rag-grafana-data:/var/lib/grafana
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/medical-rag-dashboard.json
    restart: unless-stopped
    depends_on:
      - prometheus

volumes:
  medical-rag-sessions:
  medical-rag-logs:
  medical-api-sessions:
  medical-api-logs:
  medical-rag-prometheus-data:
  medical-rag-grafana-data:
