# .github/workflows/nightly-eval.yml
# 医疗 Agentic RAG —— 夜间全量评测 + 基线刷新
#
# 每日 UTC 2:00（北京时间 10:00）运行端到端质量评测，
# 更新基线 JSON。若质量退步则自动发 Issue 报警。
#
# 依赖（均为软依赖，缺失则优雅跳过，绝不因环境缺料而误报/飘红）：
#   - SENSENOVA_API_KEY GitHub Secret（免费额度；可选，配置后启用真评测+基线刷新+退步报警）
#   - better-sqlite3 原生模块（需 apt 安装编译链）
#   - 真实 knowledge.db（可选，缺失时真实链路冒烟优雅跳过；真链路必跑下沉于本地 pre-push 钩子）

name: Nightly Eval

on:
  schedule:
    - cron: "0 2 * * *"   # 每日 UTC 2:00 = 北京时间 10:00
  workflow_dispatch:       # 支持手动触发

jobs:
  evaluate:
    name: 端到端质量评测 & 基线刷新
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: 安装构建依赖（better-sqlite3 原生模块）
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends python3 make g++
          npm ci

      - name: 真实链路冒烟（需真库；无库 runner 优雅跳过，P2-④）·硬卡
        env:
          CI: "true"
        run: |
          node scripts/ops/smoke-real-link.mjs --json || {
            code=$?
            if [ "$code" -eq 2 ]; then
              echo "::notice::真实链路冒烟跳过（本 runner 无真库，属预期）"
            else
              echo "::error::真实链路冒烟失败（exit $code）"
              exit 1
            fi
          }

      - name: 真实多轮澄清复现（B0-b 真·07-13；需外联，降级跳过）·硬卡
        env:
          CI: "true"
        run: |
          node scripts/ops/clarification-real-link.mjs --json || {
            code=$?
            if [ "$code" -eq 2 ]; then
              echo "::notice::真实多轮澄清跳过（本 runner 无外联/降级，属预期）"
            else
              echo "::error::真实多轮澄清失败（exit $code）"
              exit 1
            fi
          }

      - name: 多轮评测 harness（B3；需外联，降级跳过）·硬卡
        env:
          CI: "true"
        run: |
          node scripts/ops/eval-bench-multiturn.mjs --json || {
            code=$?
            if [ "$code" -eq 2 ]; then
              echo "::notice::多轮评测跳过（本 runner 无外联/降级，属预期）"
            else
              echo "::error::多轮评测失败（exit $code）"
              exit 1
            fi
          }

      - name: 运行全量评测（需 SENSENOVA_API_KEY；缺失/失败则优雅跳过，非故障）
        id: eval
        continue-on-error: true
        env:
          SENSENOVA_API_KEY: ${{ secrets.SENSENOVA_API_KEY || '' }}
          CI: "true"
        run: node tests/unit/answer-quality-judge.mjs

      - name: 可观测性聚合（P2-③，零依赖，WARN 不阻断）
        continue-on-error: true
        run: node scripts/ops/observability-report.mjs

      - name: 反馈闭环消费·派生 gold 候选（P2-②，零依赖；PHI 高危硬失败报警）
        run: node scripts/ops/consume-feedback.mjs --strict

      - name: 上传观测与候选产物（供人工审阅回灌）
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: observability-and-gold-candidates
          path: |
            logs/observability-report.json
            tests/reports/gold-candidates.json
          if-no-files-found: ignore

      - name: 评测可用性判定（决定后续门禁/基线是否执行）
        id: evalcheck
        run: |
          if [ -z "${{ secrets.SENSENOVA_API_KEY }}" ]; then
            echo "skip=1" >> "$GITHUB_OUTPUT"
            echo "::notice::全量评测跳过（未配置 SENSENOVA_API_KEY Secret，属预期；本地 pre-push 钩子已覆盖真链路门禁）"
          elif [ ! -f tests/reports/answer-quality-report.json ]; then
            echo "skip=1" >> "$GITHUB_OUTPUT"
            echo "::warning::评测步骤未产出报告（密钥可能配额耗尽或瞬时故障），跳过门禁与基线刷新"
          else
            echo "skip=0" >> "$GITHUB_OUTPUT"
          fi

      - name: 运行质量门禁（阈值 + 新报告 vs 基线回归对比）·硬卡
        id: gate
        if: ${{ steps.evalcheck.outputs.skip == '0' }}
        run: |
          node tests/eval-ci-gate.mjs --report=tests/reports/answer-quality-report.json --baseline=tests/reports/baseline.json --compare --strict && echo "PASS=true" >> $GITHUB_OUTPUT || { echo "PASS=false" >> $GITHUB_OUTPUT; exit 1; }

      - name: 更新基线 JSON
        if: steps.gate.outputs.PASS == 'true'
        run: |
          cp tests/reports/answer-quality-report.json tests/reports/baseline.json
          git config user.name "nightly-eval-bot"
          git config user.email "bot@medical-rag.local"
          git add tests/reports/baseline.json
          git commit -m "chore: 夜间评测基线刷新 $(date +'%Y-%m-%d')"
          git push

      - name: 质量退步 → 创建 Issue 报警（硬卡后仍触发）
        if: ${{ always() && steps.gate.outputs.PASS == 'false' }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('tests/reports/answer-quality-report.json', 'utf-8'));
            const kpi = report.metrics?.kpi || {};
            const body = [
              '## ⚠ 端到端质量退步检测',
              '',
              '夜间评测（' + new Date().toISOString() + '）基线校验未通过。',
              '',
              '### 当前指标',
              '- 引用召回率: ' + (kpi.citationRecall ?? 'N/A') + '%（期望 ≥70%）',
              '- 忠实度: ' + (kpi.llmJudge?.faithfulness ?? 'N/A'),
              '- 安全: ' + (kpi.llmJudge?.safety ?? 'N/A'),
              '- 禁戒违例率: ' + (kpi.forbiddenViolationRate ?? 'N/A') + '%',
              '',
              '请排查最近一次 PR 合入是否导致质量退化。',
              '详情见: ' + context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId,
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '⚠ 端到端质量退步检测（' + new Date().toISOString().slice(0, 10) + '）',
              body: body,
              labels: ['quality', 'automated'],
            });
