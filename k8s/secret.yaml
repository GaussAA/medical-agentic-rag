# 密钥模板 —— 切勿提交真实值！
#
# 生产环境的密钥注入方式（选一）:
#   A) kubectl create secret（快速上手）:
#      kubectl -n medical-rag create secret generic medical-rag-secrets \
#        --from-literal=API_TOKEN="$(openssl rand -hex 32)" \
#        --from-literal=SENSENOVA_API_KEY="$SENSENOVA_API_KEY" \
#        --from-literal=DEEPSEEK_API_KEY="$DEEPSEEK_API_KEY"
#
#   B) 外部密钥管理（等保三级推荐）:
#      - 云上：AWS Secrets Manager / Azure Key Vault / GCP Secret Manager
#        经 CSI Secrets Store 驱动注入（secrets-store.csi.k8s.io）
#      - 自建：HashiCorp Vault + Vault Agent Sidecar
#
#   密钥轮换：kubectl delete secret + recreate，滚动更新 Deployment 自动重载
apiVersion: v1
kind: Secret
metadata:
  name: medical-rag-secrets
  namespace: medical-rag
type: Opaque
stringData:
  # 接口鉴权：开放模式仅限本机；生产务必设强随机值并通过 Ingress/网关 TLS 暴露
  API_TOKEN: "REPLACE_WITH_STRONG_RANDOM_TOKEN"
  # 免费通道（sensenova 每日额度，泄露面极小）
  SENSENOVA_API_KEY: "REPLACE"
  # 兜底付费通道（仅真故障时回退，严格保护）
  DEEPSEEK_API_KEY: "REPLACE"
