# .github/workflows/ci.yml
# 医疗 Agentic RAG —— 持续集成门禁
#
# 触发: 推送到 master / 向 master 开 Pull Request
#
# 门禁范围（确定性、零外部依赖，反映「代码正确性 + 项目结构/合规完整性」）:
#   1) 纯逻辑单测（隔离 tmpdir，无需 API Key / 网络 / 知识库大文件）:
#      compliance(24) / provider-health(13) / kb-sources(20) / bash-guard(35) / audit-chain(10) / provider-proxy(12) / kg-graph(12)
#      / faithfulness-guard(23) / conflict-detector(19) / rag-search-version-hint(10) / scope-guard(16) / query-sanitize(10) / eval-gate(8) / audit-logger(9) / engine-version(8)
#      —— 后八项为安全/质量加固（忠实度评审/跨指南冲突/版本冲突标注/越界拦截/查询 PII 脱敏/回归对比/审计链接线/引擎版本探测），纯逻辑、零 LLM，确定性进 CI
#   2) 项目结构与合规门禁 (npm test = run-all-tests，CI 降级):
#      - 知识图谱 / 指南索引 / 大纲 结构完整性（基于已入库派生索引 JSON）
#      - 扩展文件完整性（必需扩展存在 + 语法自检）
#      - System Prompt 合规护栏（循证辅助定位、禁虚假权威、rag_search/guide_finder 引用等）
#      - CI 下跳过依赖「未入库原始文档」的断言（raw/ 不入库，见 .gitignore）
#   3) 基线健康度门禁（eval-ci-gate，gate job 内）：只读校验入仓 baseline.json 的阈值健康度，零外部依赖；
#      本步骤仅确认入仓基线未被误改坏（非 PR 质量卡点）。
#      真实「质量退步」回归检测双轨：①有 SENSENOVA_API_KEY Secret 时，由 quality-gate job 跑
#        新评测报告 vs 基线对比（--compare）并 --strict 硬卡（merge/master 前质量退步即红）；
#        job 内已 fail-closed（P0-2）：评测未产出报告 / 部分 judge 跳过（无 Key/超时/配额）一律判失败，
#        杜绝此前默认 1.0 静默放行。②无 Key 时 quality-gate job 整段跳过（休眠）；夜间仍由 nightly-eval.yml 软跑 + Issue 兜底。
#
# 未纳入主门禁（环境 / 资源限制，非代码缺陷）:
#   - retrieval-router-test: 需 better-sqlite3 原生模块（未入库，CI 需额外编译），改在本地 / 专用 runner 运行
#   - eval-bench / answer-eval-bench: 端到端评测基准，需 KB 文本 + LLM API Key，
#     作为「发布前手动 / 本地门禁」(npm run eval:*)，不在 CI 强制
#   - answer-quality-judge: 端到端答案质量评测，仅需 LLM API Key（KB 文本经 raw-txt 本地可选，CI/nightly runner 缺则降级）；
#     现经 quality-gate job 在「配置 SENSENOVA_API_KEY Secret」时强制卡点（merge/master 前质量退步即红）；
#     无 Key 时该 job 内评测/门禁步整体跳过（不误报、不阻塞无 Key 环境）。仍可用 npm run eval:* 本地手动跑。
#
# 运行环境: ubuntu-latest + Node 22。项目现已声明 better-sqlite3 依赖（package.json + lockfile 入仓），
# CI 下 npm ci 自动安装。eval-ci-gate 仅读 JSON，零外部依赖。
# 注意：门禁 job 不安装 native 模块的编译链（无 Python/g++），不影响纯 JSON 读盘。

name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  gate:
    name: 结构 & 逻辑门禁
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: 纯逻辑单测（零外部依赖）
        shell: bash
        run: |
          set -euo pipefail
          # 测试文件已重组为子目录 + .test.mjs 后缀（见 test-aggregate.mjs 全量注册表）
          for t in \
            extensions/safety/compliance.test.mjs \
            scripts/service/provider-health.test.mjs \
            lib/kb-sources.test.mjs \
            extensions/safety/bash-guard.test.mjs \
            lib/audit-chain.test.mjs \
            scripts/proxy/provider-proxy.test.mjs \
            lib/kg-graph.test.mjs \
            extensions/safety/faithfulness-guard.test.mjs \
            lib/conflict-detector.test.mjs \
            lib/rag-search-version-hint.test.mjs \
            extensions/safety/scope-guard.test.mjs \
            lib/query-sanitize.test.mjs \
            extensions/eval/gate.test.mjs \
            lib/audit-logger.test.mjs \
            lib/engine-version.test.mjs; do
            echo "::group::unit/$t"
            node "tests/unit/$t"
            echo "::endgroup::"
          done

      - name: 检索召回评测（路由 + KG 覆盖率，零外部依赖）
        shell: bash
        run: |
          echo "::group::retrieval-eval"
          node tests/eval/retrieval/eval-retrieval.mjs
          echo "::endgroup::"

      - name: 结构与合规门禁（run-all-tests, CI 降级）
        env:
          CI: "true"
        run: npm test

      - name: 基线质量门禁（eval-ci-gate，零 LLM 调用）
        run: node tests/eval-ci-gate.mjs --report=tests/reports/baseline.json

  quality-gate:
    name: 端到端质量门禁（配置 SENSENOVA_API_KEY 后激活）
    runs-on: ubuntu-latest
    # ⚠️ 激活方式：仓库 Settings → Secrets 配置 SENSENOVA_API_KEY（sensenova 免费档 Key）。
    #   未配置时本 job 整段跳过（仅本地 pre-push 钩子覆盖真链路门禁），质量门禁处于「休眠」状态。
    #   配置后：评测真实执行，且对「评测未产出报告 / 部分 judge 跳过」fail-closed（绝不按 1.0 静默放行）。
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: 端到端答案质量评测（需 Key；失败即阻断，不静默跳过）
        env:
          SENSENOVA_API_KEY: ${{ secrets.SENSENOVA_API_KEY || '' }}
          CI: "true"
        run: node tests/integration/answer-quality-judge.mjs
      - name: 评测可用性判定（决定门禁是否执行 / 失败）
        id: evalcheck
        run: |
          if [ -z "${{ secrets.SENSENOVA_API_KEY }}" ]; then
            echo "skip=1" >> "$GITHUB_OUTPUT"
            echo "::notice::全量评测跳过（未配置 SENSENOVA_API_KEY Secret，属预期；本地 pre-push 钩子已覆盖真链路门禁）"
          elif [ ! -f tests/reports/answer-quality-report.json ]; then
            echo "skip=0" >> "$GITHUB_OUTPUT"
            echo "::error::已配置 SENSENOVA_API_KEY 但评测未产出报告（密钥配额耗尽/瞬时故障/异常），质量门禁按失败处理"
          else
            echo "skip=0" >> "$GITHUB_OUTPUT"
          fi
      - name: 质量门禁（阈值 + 新报告 vs 基线回归对比）·硬卡（fail-closed）
        if: ${{ steps.evalcheck.outputs.skip == '0' }}
        run: node tests/eval-ci-gate.mjs --report=tests/reports/answer-quality-report.json --baseline=tests/reports/baseline.json --compare --strict
