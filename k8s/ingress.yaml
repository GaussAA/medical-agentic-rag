apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: medical-rag-api
  namespace: medical-rag
  annotations:
    nginx.ingress.kubernetes.io/affinity: "cookie"
    nginx.ingress.kubernetes.io/affinity-mode: "persistent"
    nginx.ingress.kubernetes.io/session-cookie-name: "medical-rag-sid"
    nginx.ingress.kubernetes.io/session-cookie-max-age: "3600"
    nginx.ingress.kubernetes.io/session-cookie-path: "/"
    # 仅 TLS（等保/合规要求）
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # cert-manager 自动签发 TLS 证书（须先安装 cert-manager + 创建 k8s/cert-manager-issuer.yaml）
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - medical-rag.example.com
      secretName: medical-rag-tls   # 由 cert-manager 签发
  rules:
    - host: medical-rag.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: medical-rag-api
                port:
                  number: 80
