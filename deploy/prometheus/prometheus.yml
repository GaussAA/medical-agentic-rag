# Prometheus 配置
# 抓取 provider-proxy（指标端点）和 self（Prometheus 自身健康）
global:
  scrape_interval:     15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'medical-rag'
    static_configs:
      - targets: ['host.docker.internal:19100']
        labels:
          app: 'medical-rag'
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
