# 密钥模板 —— 切勿提交真实值！用 `kubectl create secret` 注入或用外部密钥管理（如 CSI Secrets Store）。
# 仅免费额度 Key 可走 CI/K8s Secret（零信任原则：防的是硬编码入库，非凭证管理本身）；
# 付费 Key 严禁入库，走云厂商 KMS / 外部密钥库。
apiVersion: v1
kind: Secret
metadata:
  name: medical-rag-secrets
  namespace: medical-rag
type: Opaque
stringData:
  # 接口鉴权：开放模式仅限本机；生产务必设强随机值并通过 Ingress/网关 TLS 暴露
  API_TOKEN: "REPLACE_WITH_STRONG_RANDOM_TOKEN"
  # 免费通道（sensenova 每日额度，泄露面极小）
  SENSENOVA_API_KEY: "REPLACE"
  # 兜底付费通道（仅真故障时回退，严格保护）
  DEEPSEEK_API_KEY: "REPLACE"
