# NetworkPolicy —— 等保三级东西向隔离
# 默认拒绝所有入站流量，仅放行：
#   1. nginx-ingress 控制器（暴露 80/8080 端口）
#   2. kube-system 健康检查探针（readiness/liveness probe）
#   3. 同 Namespace 内 Prometheus 抓取（:19100 指标端口）
#
# 依赖：
#   - nginx-ingress 控制器的 namespace 须与本 Policy 中 from 匹配
#     （常见为 ingress-nginx / nginx-ingress / kube-system；按实际集群调整）
#   - Prometheus 可部署在监控命名空间（如 monitoring）并通过 namespaceSelector 放行
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: medical-rag
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    # 1) nginx Ingress 控制器 → 应用端口
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 8080
          protocol: TCP
    # 2) kubelet 健康检查探针（readinessProbe / livenessProbe）
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 8080
          protocol: TCP
    # 3) Prometheus 抓取（从 monitoring 命名空间）
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 19100
          protocol: TCP
---
# 同一命名空间内 Pod 间通信（Consul / 内部 DNS / 日志聚合等）
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-same-namespace
  namespace: medical-rag
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: medical-rag
